<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Black background -->
  <rect width="200" height="200" fill="#000"/>
  <!-- Drone arms -->
  <line x1="30" y1="72" x2="80" y2="72" stroke="#6abf14" stroke-width="5" stroke-linecap="round"/>
  <line x1="120" y1="72" x2="170" y2="72" stroke="#6abf14" stroke-width="5" stroke-linecap="round"/>
  <!-- Drone propeller hubs -->
  <ellipse cx="45" cy="68" rx="18" ry="6" fill="none" stroke="#6abf14" stroke-width="3"/>
  <ellipse cx="155" cy="68" rx="18" ry="6" fill="none" stroke="#6abf14" stroke-width="3"/>
  <!-- Center top rotor -->
  <ellipse cx="100" cy="58" rx="14" ry="5" fill="none" stroke="#6abf14" stroke-width="3"/>
  <line x1="100" y1="58" x2="100" y2="72" stroke="#6abf14" stroke-width="4"/>
  <!-- Alien head outline -->
  <path d="M 68 72 Q 60 95 65 115 Q 70 135 100 140 Q 130 135 135 115 Q 140 95 132 72 Z"
        fill="none" stroke="#6abf14" stroke-width="4" stroke-linejoin="round"/>
  <!-- Alien eyes -->
  <ellipse cx="86" cy="103" rx="10" ry="7" fill="#6abf14"/>
  <ellipse cx="114" cy="103" rx="10" ry="7" fill="#6abf14"/>
</svg>